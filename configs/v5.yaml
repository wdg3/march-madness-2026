# v5: Reduced stacking to prevent L2+ overfitting.
# Key changes from v4/default:
#   - num_stack_levels: 2 -> 1 (L1 models -> WeightedEnsemble, no deeper stacking)
#   - num_bag_folds: 10 -> 5 (sufficient for 168K rows, halves compute)
#   - Trimmed to 5 model types (dropped duplicate LightGBM/XGBoost configs)

features:
  - massey
  - conference
  - regular_season
  - tourney_history
  - rank_disagree
  - seed_rank_delta
  - close_games
  - scoring_variance
  - momentum
  - tempo
  - coach
  - conf_tourney
  - location
  - travel
  - rs_trajectory
  - massey_trajectory
  - kenpom
  - ap_poll
  - public_picks
  - roster
  - vegas

training:
  presets: best_quality
  time_limit: 14400
  num_bag_folds: 5
  num_stack_levels: 1
  train_seasons_start: 2010
  validation_season: 2025
  eval_metric: log_loss
  use_seed_prior: true
  include_regular_season: true
  include_conf_tournament: true
  time_decay_half_life: 5.0
  game_weights:
    tournament: 1.0
    conf_tournament: 0.5
    regular_season: 0.15

prediction:
  season: 2026
